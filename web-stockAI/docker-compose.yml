services:
  backend:
    build: ./backend
    container_name: webstock-backend
    ports:
      - "8005:8005"
    volumes:
      - ./backend:/app
      - ../scylla-cdc-printer:/cdc-printer:ro
    environment:
      - PYTHONUNBUFFERED=1
      - REALTIME_TRADING_HOURS_ONLY=${REALTIME_TRADING_HOURS_ONLY:-true}
      - WS_ALLOWED_ORIGINS=${WS_ALLOWED_ORIGINS:-}
      - CASSANDRA_HOST=["scylla-node1","scylla-node2","scylla-node3"]
      - CASSANDRA_PORT=9042
      - CASSANDRA_KEYSPACE=stock_data
      - SCHEMA_REGISTRY_URL=http://schema-registry:8081
      - CDC_PRINTER_PATH=/cdc-printer/target/release/scylla-cdc-printer

    restart: always
    networks:
      financi-network:
        ipv4_address: 172.18.0.123

  frontend:
    build: ./frontend
    container_name: webstock-frontend
    ports:
      - "3005:3000"
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-https://api.kytran.io.vn}
      - NEXT_PUBLIC_WS_URL=${NEXT_PUBLIC_WS_URL:-https://api.kytran.io.vn}
      - NODE_ENV=production
    depends_on:
      - backend
    restart: always
    networks:
      - financi-network
  
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: webstock-cloudflared
    command: tunnel --no-autoupdate run --token ${API_KEY_CLOUDFLARE}
    restart: unless-stopped
    networks:
      - financi-network
      
  cloudflared-2:
    image: cloudflare/cloudflared:latest
    container_name: webstock-cloudflared-2
    command: tunnel --no-autoupdate run --token ${API_KEY_CLOUDFLARE_2}
    restart: unless-stopped
    networks:
      - financi-network
      
networks:
  financi-network:
    external: true